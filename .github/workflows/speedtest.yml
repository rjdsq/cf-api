      - name: 执行测速
        run: |
          # 1. 提取原始地址：获取 # 之前的内容
          # 2. 核心清洗：删除冒号及其后的所有内容（无论是 443 还是 16027 等随机端口）
          # 3. 排序去重
          curl -s https://ip-31c.pages.dev/sub | cut -d'#' -f1 | sed 's/:.*//' | sort -u > ip.txt
          
          echo "待测速地址清单 (前5行展示)："
          head -n 5 ip.txt
          
          # 检查 ip.txt 是否为空
          if [ ! -s ip.txt ]; then echo "错误：提取到的 IP 列表为空"; exit 1; fi

          # 3. 执行测速：测延迟(-tl 250)，取前100名(-dn 100)，不测下载速(-sl 0)
          ./CloudflareST -f ip.txt -dn 100 -tl 250 -sl 0 -o result.csv
          
          if [ ! -f result.csv ]; then 
            echo "错误：未生成测速结果"
            exit 1 
          fi
