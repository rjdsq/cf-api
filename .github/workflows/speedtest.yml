name: 聚源精选测速
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  test_and_save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 测速准备
        run: |
          wget https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -zxf CloudflareST_linux_amd64.tar.gz
          chmod +x CloudflareST

      - name: 提取清洗并解析域名
        run: |
          curl -s https://ip-31c.pages.dev/sub > raw.txt
          python3 -c "
          import re, socket
          def resolve_addr(addr):
              if re.match(r'^(\d{1,3}\.){3}\d{1,3}$', addr) or ':' in addr:
                  return addr
              try:
                  return socket.gethostbyname(addr)
              except:
                  return None
          with open('raw.txt', 'r') as f:
              lines = f.readlines()
          ips = set()
          for l in lines:
              addr = l.split('#')[0].strip()
              addr = re.sub(r':[0-9]+$', '', addr).replace('[', '').replace(']', '')
              if addr:
                  res = resolve_addr(addr)
                  if res: ips.add(res)
          with open('ip.txt', 'w') as f:
              f.write('\n'.join(list(ips)))
          "
          echo "TOTAL_COUNT=$(wc -l < ip.txt)" >> $GITHUB_ENV

      - name: 执行测速
        run: |
          ./CloudflareST -f ip.txt -dn 100 -tl 250 -sl 0 -o result.csv || true

      - name: 格式化展示数据
        run: |
          python3 -c "
          import csv, json, requests, os, time
          res = []
          if os.path.exists('result.csv'):
              with open('result.csv', 'r', encoding='utf-8') as f:
                  reader = csv.DictReader(f)
                  ip_col = next((c for c in reader.fieldnames if 'IP' in c.upper()), None)
                  ping_col = next((c for c in reader.fieldnames if '延迟' in c or 'Ping' in c.upper()), None)
                  for row in reader:
                      ip_val = row[ip_col]
                      loc, cc = '未知', ''
                      try:
                          r = requests.get(f'http://ip-api.com/json/{ip_val}?lang=zh-CN', timeout=5).json()
                          loc = r.get('country', '未知')
                          cc = r.get('countryCode', '').lower()
                          time.sleep(0.5)
                      except: pass
                      res.append({'ip': ip_val, 'ping': row[ping_col], 'loc': loc, 'cc': cc})
          output = {'total': os.getenv('TOTAL_COUNT'), 'list': res}
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
          "

      - name: 自动提交
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git commit -m "Update" || exit 0
          git push
